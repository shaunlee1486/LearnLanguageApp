version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: yk_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-yk_learning_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-yk_learning_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: YK.API/Dockerfile
    container_name: yk_api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-yk_learning_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-SuperSecretKeyThatNeedsToBeLongerThan32BytesForHMACSHA256}
      - JWT_EXPIRY=${JWT_EXPIRY:-1440}
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./yk-frontend
      dockerfile: Dockerfile
    container_name: yk_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
